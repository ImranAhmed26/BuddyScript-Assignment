services:
  db:
    image: postgres:16-alpine
    container_name: buddyscript_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: buddyscript
      POSTGRES_PASSWORD: buddyscript
      POSTGRES_DB: buddyscript
    ports:
      - "5433:5432"
    volumes:
      - buddyscript_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buddyscript"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  buddyscript_pgdata:
